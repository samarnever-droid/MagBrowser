name: Build and Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-windows:
    name: Cross-Compile Windows Binary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Cargo Dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install System & Cross-Compilation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf mingw-w64

      - name: Install Node Modules
        run: npm install

      - name: Build React Frontend
        run: npm run build

      - name: Generate Dependency Graph
        run: |
          cd src-tauri
          cargo tree > ../dependencies.txt

      - name: Build Windows Executable (.exe)
        run: |
          cd src-tauri
          cargo build --target x86_64-pc-windows-gnu --release

      - name: Upload Windows Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: magbrowser-windows-x64
          path: src-tauri/target/x86_64-pc-windows-gnu/release/tauri-app.exe

      - name: Upload Dependency Graph Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-dependency-graph
          path: dependencies.txt
